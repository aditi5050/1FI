version: '3.8'
services:
  web:
    build:
      context: ../apps/web
      dockerfile: ../../infra/Dockerfile.web
    ports:
      - "3000:3000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/1fi-store
      - NEXT_PUBLIC_API_BASE=http://localhost:3000/api
    depends_on:
      - mongo

  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
